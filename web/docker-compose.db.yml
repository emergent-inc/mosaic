services:
  postgres:
    image: postgres:16-alpine
    container_name: ${MOSAIC_DB_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MOSAIC_DB_NAME}
      POSTGRES_PASSWORD: ${MOSAIC_DB_PASSWORD}
      POSTGRES_USER: ${MOSAIC_DB_USER}
    ports:
      - "${MOSAIC_DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MOSAIC_DB_USER} -d ${MOSAIC_DB_NAME}"]
      interval: 1s
      timeout: 5s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data:
    name: ${MOSAIC_DB_VOLUME_NAME}
