# mosaic Multiplayer collaboration relay — Cloudflare Worker + Durable Objects.
#
# Deploys run from .github/workflows/collaboration.yml on push to main. The
# Durable Object migration block is the service's schema migration story:
# wrangler applies class migrations atomically with every deploy.

name = "mosaic-collaboration-worker"
main = "src/index.ts"
compatibility_date = "2026-06-01"
workers_dev = true

# Grant verification (www contract, see src/grant.ts):
# - MOSAIC_COLLAB_GRANT_SECRET is a secret shared with www; set it via
#   `wrangler secret put MOSAIC_COLLAB_GRANT_SECRET`.
# - COLLABORATION_REQUIRE_GRANT stays "false" until all clients send grants;
#   presented grants are verified regardless of this flag.
[vars]
COLLABORATION_REQUIRE_GRANT = "false"

[observability]
enabled = true

[[durable_objects.bindings]]
name = "COLLABORATION_SESSIONS"
class_name = "CollaborationSessionObject"

[[durable_objects.bindings]]
name = "COLLABORATION_SESSION_INDEX"
class_name = "CollaborationSessionIndexObject"

[[durable_objects.bindings]]
name = "COLLABORATION_INBOX"
class_name = "CollaborationInboxObject"

[[durable_objects.bindings]]
name = "TEAM_SESSIONS"
class_name = "TeamSessionsObject"

# Team session transcripts (Claude Code JSONL bodies). Create the bucket once
# before the first deploy: `wrangler r2 bucket create mosaic-team-session-transcripts`.
# Session sync also needs the native-auth shared secret:
# `wrangler secret put MOSAIC_NATIVE_AUTH_SECRET` (same value as www).
[[r2_buckets]]
binding = "TEAM_SESSION_TRANSCRIPTS"
bucket_name = "mosaic-team-session-transcripts"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CollaborationSessionObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["CollaborationSessionIndexObject"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["CollaborationInboxObject"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["TeamSessionsObject"]

